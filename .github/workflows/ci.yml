name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install UI tooling dependencies
        run: |
          npm ci
          npx playwright install chromium

      - name: Lint
        run: |
          ruff check app tests

      - name: Type check
        run: |
          mypy --config-file mypy.ini app

      - name: Production config preflight
        env:
          APP_ENV: production
          SESSION_SECRET: ci-production-session-secret-0123456789abcdef
          DATABASE_URL: postgresql+psycopg2://user:password@db-host:5432/tcg_trove
          ALLOWED_ORIGINS: https://app.example.com
          PUBLIC_BASE_URL: https://app.example.com
          SMTP_ENABLED: "false"
          API_RATE_LIMIT_PER_MINUTE: "120"
          LOGIN_RATE_LIMIT_PER_MINUTE: "20"
          METRICS_AUTH_TOKEN: ci-metrics-token
        run: |
          python scripts/prod_preflight.py --env-file .env.example

      - name: Migration smoke check
        run: |
          alembic upgrade head

      - name: Run unit tests
        run: |
          pytest -q --cov=app --cov-report=term-missing --cov-fail-under=65

      - name: Startup and health smoke check
        env:
          METRICS_AUTH_TOKEN: ci-metrics-token
        run: |
          set -euo pipefail
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 &
          APP_PID=$!
          cleanup() {
            kill $APP_PID >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/health/live >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8001/health/live
          curl -fsS http://127.0.0.1:8001/health/ready
          curl -fsS -H "X-Metrics-Token: ${METRICS_AUTH_TOKEN}" http://127.0.0.1:8001/metrics

      - name: UI quality gate (flows + a11y + lighthouse)
        run: |
          npm run assets:css:minify
          npm run ui:parallel

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Static Analysis Security Testing (SAST)
        run: |
          bandit -r app -q

      - name: Dependency vulnerability scan
        run: |
          pip-audit -r requirements.txt
