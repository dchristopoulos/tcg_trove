{% extends "base.html" %}
{% block title %}{{ user.username }} - TCG Trove{% endblock %}

{% block content %}
<style>
  .profile-page {
    max-width: 820px;
    margin: 0 auto;
    display: grid;
    gap: 1rem;
  }

  .profile-hero {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    border: 1px solid #1e293b;
    border-radius: 1.2rem;
    padding: 1.8rem;
    color: #f8fafc;
    box-shadow: var(--shadow-sm);
  }

  .profile-hero h1 {
    margin: 0 0 0.35rem;
    font-size: clamp(1.8rem, 3vw, 2.3rem);
    letter-spacing: -0.02em;
  }

  .profile-hero p {
    margin: 0;
    color: #cbd5e1;
  }

  .profile-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 1rem;
    padding: 1.15rem;
    box-shadow: var(--shadow-sm);
  }

  .profile-row {
    display: grid;
    gap: 0.8rem;
  }

  .profile-item {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 0.75rem;
    padding: 0.8rem;
  }

  .profile-item span {
    display: block;
    font-size: 0.73rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    font-weight: 700;
    margin-bottom: 0.28rem;
  }

  .profile-actions {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
</style>

<div class="profile-page" data-reveal>
  <section class="profile-hero">
    <h1>{{ user.username }}</h1>
    <p>Member profile</p>
  </section>

  <section class="profile-card">
    <h2 style="margin-top: 0; margin-bottom: 0.75rem; font-size: 1.2rem;">Profile Details</h2>
    <div class="profile-row">
      <div class="profile-item">
        <span>Email</span>
        <strong>{{ user.email }}</strong>
      </div>
    </div>
    <div class="profile-actions" style="margin-top: 1rem;">
      <a href="/dashboard" class="btn btn-outline">Back to Dashboard</a>
      <a href="/account" class="btn btn-primary">Account Settings</a>
    </div>
  </section>
</div>
{% endblock %}
